<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGenAds | AI Growth Partner</title>
    <style>
        /* Dark Luxury & Glassmorphism CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0f0f10;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-item h2 {
            color: #d4af37;
            font-size: 1.8rem;
        }
        .stat-item span {
            font-size: 0.9rem;
            color: #888;
        }
        @media (max-width: 600px) {
            .stats { flex-direction: column; align-items: center; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>NextGenAds</h1>
        <p>🚀 AI Growth Partner For Modern Businesses. Premium digital marketing agency with dark luxury UI, Glassmorphism design, and AI calculator.</p>
        <div class="stats">
            <div class="stat-item">
                <h2>500+</h2>
                <span>Projects Delivered</span>
            </div>
            <div class="stat-item">
                <h2>487%</h2>
                <span>Avg ROI</span>
            </div>
        </div>
    </div>
</body>
</html>
