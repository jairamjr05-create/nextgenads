<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGenAds | AI Growth Partner</title>
    <style>
        /* Dark Luxury & Glassmorphism CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0f0f10;
            color: #fff;
            padding: 0; /* Upar ka margin hata diya */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto; /* Neeche ka bada margin hata diya */
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
            /* Box ko top par chipkane ke liye radius ka top part hata diya (optional) */
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
        .glass-card:hover {
            transform: translateY(-5px);
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-item h2 {
            color: #d4af37;
            font-size: 1.8rem;
        }
        .stat-item span {
            font-size: 0.9rem;
            color: #888;
        }

        /* Naya Section: Services (Isliye scroll karna padega) */
        .services-section {
            max-width: 800px;
            margin: 50px auto 0 auto; /* Top margin diya taaki box se door ho */
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .services-section h3 {
            color: #d4af37;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .service-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .service-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            color: #ccc;
        }

        @media (max-width: 600px) {
            .stats { flex-direction: column; align-items: center; }
            h1 { font-size: 2rem; }
            .glass-card {
                border-top-left-radius: 0;
                border-top-right-radius: 0;
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>NextGenAds</h1>
        <p>🚀 AI Growth Partner For Modern Businesses. Premium digital marketing agency with dark luxury UI, Glassmorphism design, and AI calculator.</p>
        <div class="stats">
            <div class="stat-item">
                <h2>500+</h2>
                <span>Projects Delivered</span>
            </div>
            <div class="stat-item">
                <h2>487%</h2>
                <span>Avg ROI</span>
            </div>
        </div>
    </div>

    <div class="services-section">
        <h3>Our Services</h3>
        <div class="service-list">
            <div class="service-item">SEO</div>
            <div class="service-item">Meta Ads</div>
            <div class="service-item">Google Ads</div>
            <div class="service-item">Web Dev</div>
            <div class="service-item">Branding</div>
        </div>
        <p style="margin-top: 30px; margin-bottom: 50px; font-size: 0.9rem; color: #666;">
            Scroll up and down to see the effect.
        </p>
    </div>
</body>
</html>
